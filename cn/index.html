<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>中文页面建设中 | hdt.wiki</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f6f1e8;
        color: #191919;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(520px, calc(100vw - 48px));
      }

      h1 {
        margin: 0 0 16px;
        font-size: 28px;
        font-weight: 700;
      }

      p {
        margin: 0 0 24px;
        line-height: 1.7;
      }

      a {
        color: inherit;
        text-underline-offset: 4px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>中文页面建设中</h1>
      <p>当前网站主版本已迁移到英文页面。中文内容会在后续整理后开放。</p>
      <a href="/en/">进入英文主页</a>
    </main>
  </body>
</html>
