<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Journal | New Personal Homepage</title>
    <link rel="preload" href="../assets/transition-topography.png" as="image">
    <script>
      (() => {
        try {
          if (sessionStorage.getItem("personalHomePageTransition") === "incoming") {
            document.documentElement.classList.add("page-transition-active", "page-transition-cold-cover");
          }
        } catch (error) {}
      })();
    </script>
    <link rel="stylesheet" href="../assets/styles.css">
    <script src="../assets/site-data.js" defer></script>
    <script src="../assets/journal-data.js" defer></script>
    <script src="../assets/app.js" defer></script>
  </head>
  <body class="journal-page" data-page="journal">
    <header class="site-header">
      <a class="brand" href="/en/" aria-label="New Personal Homepage home">
        <span class="brand-mark" aria-hidden="true"></span>
        <span data-site-name>New Personal Homepage</span>
      </a>
      <button class="nav-toggle" type="button" aria-label="Toggle navigation" aria-expanded="false">
        <span></span>
        <span></span>
      </button>
      <nav class="site-nav" aria-label="Main navigation">
        <a href="/en/profile/">Profile</a>
        <a href="/en/journal/" aria-current="page">Journal</a>
        <a href="/en/gallery/">Gallery</a>
        <a href="/en/contact/">Contact</a>
      </nav>
    </header>

    <main class="journal-shell" data-journal>
      <section class="journal-media" aria-hidden="true" data-journal-media-root></section>
      <section class="journal-track" aria-label="Journal entries">
        <div class="journal-slides" data-journal-slides></div>
      </section>
      <div class="journal-controls" aria-hidden="true">
        <span data-journal-current>01</span>
        <span></span>
        <span data-journal-total>00</span>
      </div>
    </main>
  </body>
</html>
