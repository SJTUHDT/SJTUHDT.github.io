<!doctype html>
<html lang="en">
  <head>

    <link rel="preload" href="../assets/transition-topography.png" as="image">
    <script>
      (() => {
        try {
          if (sessionStorage.getItem("personalHomePageTransition") === "incoming") {
            document.documentElement.classList.add("page-transition-active", "page-transition-cold-cover");
          }
        } catch (error) {}
      })();
    </script>
    <link rel="stylesheet" href="../assets/styles.css">
    <script src="../assets/site-data.js" defer></script>
    <script src="../assets/journal-data.js" defer></script>
    <script src="../assets/app.js" defer></script>
  </head>

      <a class="brand" href="/en/" aria-label="New Personal Homepage home">

        <span data-site-name>New Personal Homepage</span>
      </a>
      <button class="nav-toggle" type="button" aria-label="Toggle navigation" aria-expanded="false">
        <span></span>
        <span></span>
      </button>
      <nav class="site-nav" aria-label="Main navigation">
        <a href="/en/profile/">Profile</a>
        <a href="/en/journal/" aria-current="page">Journal</a>
        <a href="/en/gallery/">Gallery</a>
        <a href="/en/contact/">Contact</a>

    <main class="journal-detail" data-journal-detail>
